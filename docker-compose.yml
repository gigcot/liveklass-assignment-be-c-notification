services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://${DB_HOST}:3306/${MYSQL_DATABASE}?serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true"
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10

  relay:
    build: ./relay
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      WEB_BASE_URL: ${WEB_BASE_URL}
    deploy:
      replicas: ${RELAY_REPLICAS:-1}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  worker:
    build: ./worker
    environment:
      REDIS_HOST: ${REDIS_HOST}
      WEB_BASE_URL: ${WEB_BASE_URL}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  mysql_data:
